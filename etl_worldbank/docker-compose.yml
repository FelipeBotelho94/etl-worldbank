version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: etl_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  etl_app:
    build: .
    container_name: etl_python_app
    depends_on:
      - postgres
    environment:
      API_BASE_URL: ${API_BASE_URL}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    command: ["python", "src/main.py"]

volumes:
  postgres_data: